<!DOCTYPE html>
<html>
<head>
  <title>Energize Therapy Report</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#0a0a0a;
      color:white;
      font-family:sans-serif;
    }

    .accent{
      color:#14B8C8;
    }
  </style>
</head>

<body>

<div class="max-w-6xl mx-auto p-10">

  <img
    src="assets/energize-logo.png"
    width="250"
  >

  <h1 class="text-5xl font-bold mt-8">
    Athlete Performance Report
  </h1>

  <div class="grid grid-cols-4 gap-6 mt-10">

    <div class="bg-zinc-900 p-6 rounded-xl">
      <h3>Peak Force</h3>
      <p class="text-4xl accent">2480N</p>
    </div>

    <div class="bg-zinc-900 p-6 rounded-xl">
      <h3>Relative Force</h3>
      <p class="text-4xl accent">31.2</p>
    </div>

    <div class="bg-zinc-900 p-6 rounded-xl">
      <h3>CMJ Height</h3>
      <p class="text-4xl accent">42cm</p>
    </div>

    <div class="bg-zinc-900 p-6 rounded-xl">
      <h3>Readiness</h3>
      <p class="text-4xl accent">84</p>
    </div>

  </div>

</div>

</body>
</html>
